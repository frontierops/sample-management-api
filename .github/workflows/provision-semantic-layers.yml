name: Semantic layers
on:
  pull_request:          # PRs: dry-run validation only â€” nothing is written
  push:
    branches: [main]     # merges to main: apply

permissions:
  id-token: write   # required â€” lets the job request a GitHub OIDC token
  contents: read

env:
  MANAGEMENT_API: https://app.frontierops.ai   # also the required OIDC audience
  # Layout: orgs/<org-slug>/<connector-slug>/semantic-layers/<layer-slug>.yaml
  # The connector is a directory level, so an org with several connectors keeps
  # each connector's layers separate. Both org and connector come from the path.

jobs:
  # â”€â”€ Pull requests: validate every YAML file, fail the check on errors â”€â”€
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Exchange GitHub OIDC token
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$MANAGEMENT_API" | jq -r '.value')
          ACCESS_TOKEN=$(curl -sS --fail-with-body -X POST "$MANAGEMENT_API/api/v1/management/token" \
            -H 'Content-Type: application/json' \
            -d "{\"token\":\"$OIDC_TOKEN\"}" | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Token exchange FAILED â€” response from the Management API:"
            curl -sS -X POST "$MANAGEMENT_API/api/v1/management/token" -H 'Content-Type: application/json' -d "{\"token\":\"$OIDC_TOKEN\"}"
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"

      - name: Validate semantic layers (dry-run, nothing written)
        run: |
          status=0
          for file in orgs/*/*/semantic-layers/*.yaml; do
            [ -e "$file" ] || continue
            org=$(basename "$(dirname "$(dirname "$(dirname "$file")")")")
            slug=$(basename "$file" .yaml)
            yaml=$(jq -Rs . < "$file")
            result=$(curl -sS --fail-with-body -X POST \
              "$MANAGEMENT_API/api/v1/management/orgs/$org/semantic-layers/validate" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H 'Content-Type: application/json' \
              -d "{\"model_yaml\":$yaml}") || { status=1; continue; }
            if echo "$result" | jq -e '.valid' > /dev/null; then
              echo "âś“ $org/$slug"
            else
              echo "âś— $org/$slug:"
              echo "$result" | jq -r '.errors[]' | sed 's/^/    /'
              status=1
            fi
          done
          exit $status

  # â”€â”€ Merges to main: idempotent apply â”€â”€
  provision:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Exchange GitHub OIDC token
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$MANAGEMENT_API" | jq -r '.value')
          ACCESS_TOKEN=$(curl -sS --fail-with-body -X POST "$MANAGEMENT_API/api/v1/management/token" \
            -H 'Content-Type: application/json' \
            -d "{\"token\":\"$OIDC_TOKEN\"}" | jq -r '.access_token')
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Token exchange FAILED â€” response from the Management API:"
            curl -sS -X POST "$MANAGEMENT_API/api/v1/management/token" -H 'Content-Type: application/json' -d "{\"token\":\"$OIDC_TOKEN\"}"
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"

      - name: Apply semantic layers (orgs/<org-slug>/<connector-slug>/semantic-layers/<layer-slug>.yaml)
        run: |
          status=0
          for file in orgs/*/*/semantic-layers/*.yaml; do
            [ -e "$file" ] || continue
            org=$(basename "$(dirname "$(dirname "$(dirname "$file")")")")
            connector=$(basename "$(dirname "$(dirname "$file")")")
            slug=$(basename "$file" .yaml)
            echo "Applying $org/$slug (connector: $connector)"
            yaml=$(jq -Rs . < "$file")
            curl -sS --fail-with-body -X PUT \
              "$MANAGEMENT_API/api/v1/management/orgs/$org/semantic-layers/by-slug/$slug" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H 'Content-Type: application/json' \
              -d "{\"connector\":\"$connector\",\"model_yaml\":$yaml}" || status=1
          done
          exit $status
